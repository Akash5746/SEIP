apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: seip
  labels:
    app: notification-service
    app.kubernetes.io/part-of: seip
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/seip/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
              name: http
          envFrom:
            - configMapRef:
                name: seip-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seip-secrets
                  key: db-password
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seip-secrets
                  key: mail-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: seip-notification
  namespace: seip
  labels:
    app: notification-service
    app.kubernetes.io/part-of: seip
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8085
      targetPort: 8085
