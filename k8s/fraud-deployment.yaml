apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-service
  namespace: seip
  labels:
    app: fraud-service
    app.kubernetes.io/part-of: seip
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-service
  template:
    metadata:
      labels:
        app: fraud-service
    spec:
      containers:
        - name: fraud-service
          image: ghcr.io/seip/fraud-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
              name: http
          envFrom:
            - configMapRef:
                name: seip-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seip-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: seip-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: seip-fraud
  namespace: seip
  labels:
    app: fraud-service
    app.kubernetes.io/part-of: seip
spec:
  type: ClusterIP
  selector:
    app: fraud-service
  ports:
    - name: http
      port: 8084
      targetPort: 8084
