apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: seip
  labels:
    app: ml-service
    app.kubernetes.io/part-of: seip
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: ghcr.io/seip/ml-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8088
              name: http
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: seip-ml
  namespace: seip
  labels:
    app: ml-service
    app.kubernetes.io/part-of: seip
spec:
  type: ClusterIP
  selector:
    app: ml-service
  ports:
    - name: http
      port: 8088
      targetPort: 8088
