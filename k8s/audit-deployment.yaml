apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: seip
  labels:
    app: audit-service
    app.kubernetes.io/part-of: seip
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      containers:
        - name: audit-service
          image: ghcr.io/seip/audit-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - configMapRef:
                name: seip-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seip-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: seip-audit
  namespace: seip
  labels:
    app: audit-service
    app.kubernetes.io/part-of: seip
spec:
  type: ClusterIP
  selector:
    app: audit-service
  ports:
    - name: http
      port: 8086
      targetPort: 8086
