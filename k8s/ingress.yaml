apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seip-ingress
  namespace: seip
  labels:
    app.kubernetes.io/part-of: seip
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: seip.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seip-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: seip-api-gateway
                port:
                  number: 8080
  tls:
    - hosts:
        - seip.example.com
      secretName: seip-tls
