version: '3.9'

networks:
  seip-network:
    driver: bridge
    name: seip-network

volumes:
  postgres-data:
  minio-data:
  kafka-data:
  elasticsearch-data:
  prometheus-data:
  grafana-data:

services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: seip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: seip_db
      POSTGRES_USER: seip_user
      POSTGRES_PASSWORD: seip_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - seip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seip_user -d seip_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: seip-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - seip-network

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: seip-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - seip-network
    volumes:
      - kafka-data:/var/lib/kafka/data

  minio:
    image: minio/minio:latest
    container_name: seip-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: seip_minio_user
      MINIO_ROOT_PASSWORD: seip_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - seip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: seip-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - seip-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────

  api-gateway:
    image: ghcr.io/seip/api-gateway:latest
    build: ./services/api-gateway
    container_name: seip-api-gateway
    restart: unless-stopped
    ports:
      - "8880:8080"
    environment:
      JWT_SECRET: seip-super-secret-jwt-key-2024-must-be-at-least-64-chars-long-for-hs512
      AUTH_SERVICE_HOST: seip-auth
      USER_SERVICE_HOST: seip-user
      EXPENSE_SERVICE_HOST: seip-expense
      FRAUD_SERVICE_HOST: seip-fraud
      NOTIFICATION_SERVICE_HOST: seip-notification
      AUDIT_SERVICE_HOST: seip-audit
      ANALYTICS_SERVICE_HOST: seip-analytics
    depends_on:
      - auth-service
      - expense-service
    networks:
      - seip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  auth-service:
    image: ghcr.io/seip/auth-service:latest
    build: ./services/auth-service
    container_name: seip-auth
    restart: unless-stopped
    ports:
      - "8881:8081"
    environment:
      DB_HOST: seip-postgres
      DB_PORT: "5432"
      DB_NAME: seip_db
      DB_USER: seip_user
      DB_PASSWORD: seip_secret_2024
      JWT_SECRET: seip-super-secret-jwt-key-2024-must-be-at-least-64-chars-long-for-hs512
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USER: ${MAIL_USER:-noreply@seip.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - seip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  user-service:
    image: ghcr.io/seip/user-service:latest
    build: ./services/user-service
    container_name: seip-user
    restart: unless-stopped
    ports:
      - "8882:8082"
    environment:
      DB_HOST: seip-postgres
      DB_PORT: "5432"
      DB_NAME: seip_db
      DB_USER: seip_user
      DB_PASSWORD: seip_secret_2024
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - seip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  expense-service:
    image: ghcr.io/seip/expense-service:latest
    build: ./services/expense-service
    container_name: seip-expense
    restart: unless-stopped
    ports:
      - "8883:8083"
    environment:
      DB_HOST: seip-postgres
      DB_PORT: "5432"
      DB_NAME: seip_db
      DB_USER: seip_user
      DB_PASSWORD: seip_secret_2024
      KAFKA_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://seip-minio:9000
      MINIO_ACCESS_KEY: seip_minio_user
      MINIO_SECRET_KEY: seip_minio_secret
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - seip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  fraud-service:
    image: ghcr.io/seip/fraud-service:latest
    build: ./services/fraud-service
    container_name: seip-fraud
    restart: unless-stopped
    ports:
      - "8884:8084"
    environment:
      DB_HOST: seip-postgres
      DB_PORT: "5432"
      DB_NAME: seip_db
      DB_USER: seip_user
      DB_PASSWORD: seip_secret_2024
      KAFKA_SERVERS: kafka:29092
      EXPENSE_SERVICE_URL: http://seip-expense:8083
      ML_SERVICE_URL: http://seip-ml:8088
    depends_on:
      - postgres
      - kafka
      - ml-service
    networks:
      - seip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  notification-service:
    image: ghcr.io/seip/notification-service:latest
    build: ./services/notification-service
    container_name: seip-notification
    restart: unless-stopped
    ports:
      - "8885:8085"
    environment:
      DB_HOST: seip-postgres
      DB_PORT: "5432"
      DB_NAME: seip_db
      DB_USER: seip_user
      DB_PASSWORD: seip_secret_2024
      KAFKA_SERVERS: kafka:29092
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: "587"
      MAIL_USER: ${MAIL_USER:-noreply@seip.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-changeme}
    depends_on:
      - postgres
      - kafka
    networks:
      - seip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  audit-service:
    image: ghcr.io/seip/audit-service:latest
    build: ./services/audit-service
    container_name: seip-audit
    restart: unless-stopped
    ports:
      - "8886:8086"
    environment:
      DB_HOST: seip-postgres
      DB_PORT: "5432"
      DB_NAME: seip_db
      DB_USER: seip_user
      DB_PASSWORD: seip_secret_2024
      KAFKA_SERVERS: kafka:29092
    depends_on:
      - postgres
      - kafka
    networks:
      - seip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  analytics-service:
    image: ghcr.io/seip/analytics-service:latest
    build: ./services/analytics-service
    container_name: seip-analytics
    restart: unless-stopped
    ports:
      - "8887:8087"
    environment:
      DB_HOST: seip-postgres
      DB_PORT: "5432"
      DB_NAME: seip_db
      DB_USER: seip_user
      DB_PASSWORD: seip_secret_2024
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - seip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  ml-service:
    image: ghcr.io/seip/ml-service:latest
    build: ./ml-service
    container_name: seip-ml
    restart: unless-stopped
    ports:
      - "8888:8088"
    networks:
      - seip-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/metrics')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/seip/frontend:latest
    build: ./frontend
    container_name: seip-frontend
    restart: unless-stopped
    ports:
      - "3030:80"
    depends_on:
      - api-gateway
    networks:
      - seip-network

  # ─────────────────────────────────────────────
  # MONITORING
  # ─────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: seip-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - seip-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: seip-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: seip_grafana_2024
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
      GF_LOG_LEVEL: warn
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - seip-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.0
    container_name: seip-logstash
    restart: unless-stopped
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5000:5000/tcp"
      - "5044:5044"
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - seip-network
