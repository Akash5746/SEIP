input {
  # Tail log files written by services
  file {
    path => "/logs/**/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json {
      charset => "UTF-8"
    }
    tags => ["file-input"]
  }

  # Accept JSON log lines over TCP (e.g. from log4j SocketAppender)
  tcp {
    port => 5000
    codec => json_lines {
      charset => "UTF-8"
    }
    tags => ["tcp-input"]
  }

  # Accept log events from Beats (Filebeat, Metricbeat)
  beats {
    port => 5044
    tags => ["beats-input"]
  }
}

filter {
  # Parse embedded JSON in the "message" field (common for structured loggers)
  if [message] {
    json {
      source  => "message"
      target  => "parsed"
      skip_on_invalid_json => true
    }

    # Merge parsed fields into root if parsing succeeded
    if [parsed] {
      ruby {
        code => "
          parsed = event.get('parsed')
          if parsed.is_a?(Hash)
            parsed.each { |k, v| event.set(k, v) unless event.get(k) }
          end
          event.remove('parsed')
        "
      }
    }
  }

  # Normalise @timestamp
  date {
    match    => ["@timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZZ", "yyyy-MM-dd HH:mm:ss"]
    target   => "@timestamp"
    timezone => "UTC"
  }

  # Enrich with environment metadata
  mutate {
    add_field => {
      "environment" => "development"
      "platform"    => "seip"
    }

    # Normalise log level to uppercase
    uppercase => ["level", "severity"]

    # Drop noisy actuator health-check log lines to keep index lean
    remove_field => ["agent", "ecs", "input"]
  }

  # Drop Spring Boot actuator health-check spam
  if [uri] =~ /actuator\/health/ {
    drop {}
  }

  # Tag high-severity events for fast Kibana filtering
  if [level] in ["ERROR", "FATAL"] or [severity] in ["ERROR", "FATAL"] {
    mutate { add_tag => ["error"] }
  }

  if [level] == "WARN" or [severity] == "WARN" {
    mutate { add_tag => ["warning"] }
  }

  # Tag fraud-related events
  if [logger_name] =~ /fraud/ or [message] =~ /(?i)fraud/ {
    mutate { add_tag => ["fraud-event"] }
  }

  # Grok fallback for plain-text logs that weren't JSON
  if "_jsonparsefailure" in [tags] {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{LOGLEVEL:level}\s+%{NUMBER:pid}\s+---\s+\[%{DATA:thread}\]\s+%{DATA:logger_name}\s+:\s+%{GREEDYDATA:log_message}"
      }
      overwrite => ["message"]
      tag_on_failure => ["_grokparsefailure"]
    }
  }
}

output {
  # Primary output: Elasticsearch
  elasticsearch {
    hosts    => ["http://seip-elasticsearch:9200"]
    index    => "seip-logs-%{+YYYY.MM.dd}"
    # Optional: use ILM for automatic rollover
    # ilm_enabled => true
    # ilm_rollover_alias => "seip-logs"
    # ilm_pattern => "{now/d}-000001"
    # ilm_policy => "seip-log-policy"
  }

  # Console output for local debugging (comment out in production)
  stdout {
    codec => rubydebug {
      metadata => false
    }
  }
}
