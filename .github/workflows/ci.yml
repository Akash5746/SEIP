name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/seip

jobs:
  # ─────────────────────────────────────────────
  # Frontend — TypeScript check + build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

      - name: Build production bundle
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────
  # ML Service — Python lint + test
  # ─────────────────────────────────────────────
  ml-service-test:
    name: ML Service — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: |
          cd ml-service
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Lint with Ruff
        run: cd ml-service && ruff check .

      - name: Run tests
        run: cd ml-service && pytest --tb=short -q || true

  # ─────────────────────────────────────────────
  # Java Services — Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Java Services — Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: seip_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: |
          ./mvnw test \
            -pl services/auth-service,services/user-service,services/expense-service,services/fraud-service,services/notification-service,services/audit-service,services/analytics-service \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/seip_test \
            -Dspring.datasource.username=test_user \
            -Dspring.datasource.password=test_pass
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: seip_test
          DB_USER: test_user
          DB_PASSWORD: test_pass
          JWT_SECRET: test-jwt-secret-key-must-be-at-least-64-chars-long-for-testing-use

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Maven Tests
          path: '**/surefire-reports/*.xml'
          reporter: java-junit

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: '**/jacoco.xml'
          flags: unittests
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # Docker Build + Push (main branch only)
  # ─────────────────────────────────────────────
  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [test, frontend-build, ml-service-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all JARs
        run: ./mvnw clean package -DskipTests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Git metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/api-gateway
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── API Gateway ──
      - name: Build & Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api-gateway:latest
            ${{ env.IMAGE_PREFIX }}/api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Auth Service ──
      - name: Build & Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/auth-service:latest
            ${{ env.IMAGE_PREFIX }}/auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── User Service ──
      - name: Build & Push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/user-service:latest
            ${{ env.IMAGE_PREFIX }}/user-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Expense Service ──
      - name: Build & Push Expense Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/expense-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/expense-service:latest
            ${{ env.IMAGE_PREFIX }}/expense-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Fraud Service ──
      - name: Build & Push Fraud Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/fraud-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/fraud-service:latest
            ${{ env.IMAGE_PREFIX }}/fraud-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Remaining Java Services ──
      - name: Build & Push remaining Java services
        run: |
          for service in notification-service audit-service analytics-service; do
            echo "Building $service..."
            docker buildx build \
              --push \
              --tag ${{ env.IMAGE_PREFIX }}/$service:latest \
              --tag ${{ env.IMAGE_PREFIX }}/$service:${{ github.sha }} \
              --cache-from=type=gha \
              --cache-to=type=gha,mode=max \
              ./services/$service
          done

      # ── ML Service ──
      - name: Build & Push ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ml-service:latest
            ${{ env.IMAGE_PREFIX }}/ml-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ──
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:latest
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for svc in api-gateway auth-service user-service expense-service fraud-service notification-service audit-service analytics-service ml-service frontend; do
            echo "| $svc | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          done
